{% extends "base.html" %}
{% block title %}Register | ForgeFit{% endblock %}

{% block content %}
<div class="row justify-content-center py-5">
  <div class="col-md-6 col-lg-5">
    <div class="card border-0 shadow-sm">
      <div class="card-body p-4">
        <h2 class="h4 mb-3">Create Your ForgeFit Account</h2>
        <form method="post">
          <div class="mb-3">
            <label class="form-label">Username</label>
            <input type="text" class="form-control" name="username" required minlength="3">
          </div>
          <div class="mb-3">
            <label class="form-label">Password</label>
            <input type="password" class="form-control" name="password" required minlength="6">
          </div>
          <div class="mb-3">
            <label class="form-label">Confirm Password</label>
            <input type="password" class="form-control" name="confirm_password" required minlength="6">
          </div>
          <button class="btn btn-primary w-100" type="submit">Register</button>
        </form>
        <p class="text-muted small mt-3 mb-0">Already have an account? <a href="{{ url_for('login') }}">Login</a></p>
      </div>
    </div>
  </div>
</div>
{% endblock %}
